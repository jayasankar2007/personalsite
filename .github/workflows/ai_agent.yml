name: "AI Admin Control Engine"

on:
  push:
    paths:
      - 'ai_instructions.txt'
      - 'index.html'

jobs:
  process_ai_changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          # FIXED: Swapped out broken PAT reference with default context token provider
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Gemini API Text Processing
        id: ai_agent
        run: |
          USER_PROMPT=$(cat ai_instructions.txt)
          
          # Skip running if file is idle
          if [[ "$USER_PROMPT" == *"[System Idle:"* ]] || [ -z "$USER_PROMPT" ]; then
            echo "System is in idle state. Skipping textual data updates."
          else
            if [ ! -s data.json ] || ! jq . data.json >/dev/null 2>&1; then
              echo '{"hero_title":"Jayasankar Gnanadesigan","hero_bio":"Embedded Systems Architect","linkedin_url":"#","email":"jayasankar4projects@gmail.com"}' > data.json
            fi
            CURRENT_DATA=$(cat data.json)
            
            # FIXED: Rewrote instructions to safely preserve top-level dictionary structures
            SYSTEM_INSTRUCTION="You are a strict data formatter. Combine the user changes into the current json properties. You must output a single, raw valid JSON object with keys matching exactly: hero_title, hero_bio, linkedin_url, email. Do NOT touch or omit any other architectural attributes. Do NOT include markdown blocks, backticks, or any explanatory text. Output pure JSON only."
            PROMPT_BODY="System Guidelines: $SYSTEM_INSTRUCTION \n Current State Data: $CURRENT_DATA \n Modification Request: $USER_PROMPT"
            
            echo "Contacting Gemini API Engine Layer..."
            
            RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"contents\": [{
                  \"parts\": [{
                    \"text\": $(echo -n "$PROMPT_BODY" | jq -R -s .)
                  }]
                }]
              }")
            
            RAW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
            
            if [ -n "$RAW_TEXT" ]; then
              CLEAN_JSON=$(echo "$RAW_TEXT" | sed 's/```json//g' | sed 's/```//g' | tr -d '\r' | tr -d '\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
              if echo "$CLEAN_JSON" | jq . > /dev/null 2>&1; then
                echo "$CLEAN_JSON" | jq . > data.json
              fi
            fi
            echo "[System Idle: Waiting for next user instruction]" > ai_instructions.txt
          fi

      

      - name: Push AI State Updates to Main
        run: |
          git config --global user.name "AI_Admin_Agent"
          git config --global user.email "ai-agent@vercel.updates"
          
          git add data.json ai_instructions.txt index.html
          
          if ! git diff --cached --exit-code; then
            git commit -m "automation: properties adjusted and secure client tokens injected"
            git push
          else
            echo "No changes detected to push."
          fi

name: "AI Admin Control Engine"

on:
  push:
    paths:
      - 'ai_instructions.txt'

jobs:
  process_ai_changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_PAT }}

      - name: Execute Gemini API Text Processing
        id: ai_agent
        run: |
          USER_PROMPT=$(cat ai_instructions.txt)
          CURRENT_DATA=$(cat data.json)
          
          # Upgraded system prompt forcing raw JSON string compilation
          SYSTEM_INSTRUCTION="You are a data parser. Combine the user changes into the current data structure. You must output a raw JSON object with keys exactly matching: hero_title, hero_bio, linkedin_url, email. Do NOT include markdown fences, backticks, or text before/after the object. Example output: {\"hero_title\":\"Text\",\"hero_bio\":\"Text\",\"linkedin_url\":\"Link\",\"email\":\"Mail\"}"
          
          PROMPT_BODY="System Guidelines: $SYSTEM_INSTRUCTION \n Current State Data: $CURRENT_DATA \n Modification Request: $USER_PROMPT"
          
          echo "Contacting Gemini API Layer..."
          
          RESPONSE=$(curl -s -X POST "[https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$](https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$){{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $(echo -n "$PROMPT_BODY" | jq -R -s .)
                }]
              }]
            }")
          
          # Robust data cleaning pipeline
          RAW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
          # Strip backticks, json blocks, leading/trailing white spaces, and newlines
          CLEAN_JSON=$(echo "$RAW_TEXT" | sed 's/```json//g' | sed 's/```//g' | tr -d '\r' | tr -d '\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          
          # Validate layout structure before committing
          if echo "$CLEAN_JSON" | jq . > /dev/null 2>&1; then
            echo "$CLEAN_JSON" | jq . > data.json
            echo "Successfully parsed and saved fresh parameters."
          else
            echo "Format Mismatch. Attempting emergency extraction..."
            # Regex fallback tool if Gemini still appends markdown lines
            EXTRACTED_JSON=$(echo "$RAW_TEXT" | grep -o '{.*}')
            if echo "$EXTRACTED_JSON" | jq . > /dev/null 2>&1; then
              echo "$EXTRACTED_JSON" | jq . > data.json
              echo "Emergency extraction successful."
            else
              echo "Error: Output structural integrity check failed."
              exit 1
            fi
          fi

      - name: Push AI State Updates to Main
        run: |
          git config --global user.name "AI_Admin_Agent"
          git config --global user.email "ai-agent@vercel.updates"
          
          if ! git diff --exit-code data.json; then
            git add data.json
            git commit -m "automation: data.json properties updated via Gemini Engine Node"
            git push
          else
            echo "No changes detected."
          fi

name: "AI Admin Control Engine"

on:
  push:
    paths:
      - 'ai_instructions.txt'

jobs:
  process_ai_changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_PAT }}

      - name: Execute Gemini API Text Processing
        id: ai_agent
        run: |
          USER_PROMPT=$(cat ai_instructions.txt)
          
          if [ ! -s data.json ] || ! jq . data.json >/dev/null 2>&1; then
            echo '{"hero_title":"Jayasankar Gnanadesigan","hero_bio":"Embedded Systems Architect","linkedin_url":"#","email":"jayasankar4projects@gmail.com"}' > data.json
          fi
          CURRENT_DATA=$(cat data.json)
          
          SYSTEM_INSTRUCTION="You are a strict data formatter. Combine the user changes into the current json properties. You must output a single, raw valid JSON object with keys matching exactly: hero_title, hero_bio, linkedin_url, email. Do NOT include markdown blocks, backticks, or any explanatory text. Output pure JSON only."
          PROMPT_BODY="System Guidelines: $SYSTEM_INSTRUCTION \n Current State Data: $CURRENT_DATA \n Modification Request: $USER_PROMPT"
          
          echo "Contacting Gemini API Engine Layer..."
          
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $(echo -n "$PROMPT_BODY" | jq -R -s .)
                }]
              }]
            }")
          
          # DIAGNOSTIC: Print out raw response to logs if execution hits a roadblock
          echo "===== RAW API RESPONSE FROM GOOGLE ====="
          echo "$RESPONSE"
          echo "========================================"
          
          RAW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$RAW_TEXT" ]; then
            echo "API structural failure or invalid API key. Read response printout above."
            exit 1
          fi
          
          CLEAN_JSON=$(echo "$RAW_TEXT" | sed 's/```json//g' | sed 's/```//g' | tr -d '\r' | tr -d '\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          
          if echo "$CLEAN_JSON" | jq . > /dev/null 2>&1; then
            echo "$CLEAN_JSON" | jq . > data.json
          else
            EXTRACTED_JSON=$(echo "$RAW_TEXT" | grep -o '{.*}')
            if echo "$EXTRACTED_JSON" | jq . > /dev/null 2>&1; then
              echo "$EXTRACTED_JSON" | jq . > data.json
            else
              echo "Parsing failure."
              exit 1
            fi
          fi

      - name: Push AI State Updates to Main
        run: |
          git config --global user.name "AI_Admin_Agent"
          git config --global user.email "ai-agent@vercel.updates"
          
          if ! git diff --exit-code data.json; then
            git add data.json
            git commit -m "automation: data.json updated via Gemini Engine Node"
            git push
          else
            echo "No changes detected to push."
          fi

<!DOCTYPE html>
<html lang="en" class="scroll-smooth selection:bg-blue-600 selection:text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayasankar Gnanadesigan // Portfolio Core</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #030712; overflow-x: hidden; }
        .glass-card {
            background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover { border-color: rgba(37, 99, 235, 0.4); box-shadow: 0 0 25px rgba(37, 99, 235, 0.2); transform: translateY(-4px) scale(1.01); }
        .neon-text-glow { text-shadow: 0 0 20px rgba(37, 99, 235, 0.6), 0 0 40px rgba(37, 99, 235, 0.2); }
        @keyframes dynamicShimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .shimmer-bar { background: linear-gradient(-45deg, #2563eb, #3b82f6, #10b981, #6366f1); background-size: 400% 400%; animation: dynamicShimmer 6s ease infinite; }
        .view-panel { display: none; opacity: 0; transform: scale(0.98) translateY(10px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-panel.active-view { display: block; opacity: 1; transform: scale(1) translateY(0); }
        .nav-active { color: #3b82f6 !important; font-weight: 600; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); border-bottom: 2px solid #3b82f6; }
        #chat-window { display: none; opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        #chat-window.open { display: flex; opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="text-neutral-300 antialiased min-h-screen pb-20 relative">
    <div class="w-full h-1.5 shimmer-bar"></div>
    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="flex flex-col sm:flex-row justify-between items-center gap-6 mb-24 pb-6 border-b border-neutral-800">
            <a href="#" class="font-display font-bold text-lg text-white tracking-tight">jayasankar.g</a>
            <nav id="dynamic-nav" class="flex gap-6 text-xs uppercase tracking-widest text-neutral-500 font-medium"></nav>
        </header>

        <main id="dynamic-viewport" class="min-h-[450px]"></main>

        <section class="mt-24 p-8 bg-neutral-900/50 border border-neutral-800 rounded-2xl text-white flex flex-col md:flex-row justify-between items-center gap-6 shadow-md backdrop-blur-md">
            <div class="space-y-1 text-center md:text-left">
                <h3 class="text-lg font-display font-bold">Initialize Shared Execution</h3>
                <p class="text-xs text-neutral-400 font-light">Available for engineering collaborations regarding hardware and automated loops.</p>
            </div>
            <div class="flex gap-4 font-medium text-xs">
                <a id="cms-email-btn" href="mailto:jayasankar4projects@gmail.com" class="px-4 py-2.5 bg-neutral-900 border border-neutral-800 rounded-lg text-white">Email Terminal</a>
                <a id="cms-linkedin-btn" href="#" target="_blank" class="px-4 py-2.5 bg-blue-600 text-white rounded-lg">Connect LinkedIn ↗</a>
            </div>
        </section>

        <footer class="mt-20 pt-6 border-t border-neutral-800 flex flex-col md:flex-row justify-between items-center gap-4 text-[11px] uppercase text-neutral-500">
            <div>© 2026 // Jayasankar Gnanadesigan.</div>
            <div class="flex gap-4 items-center font-bold text-neutral-400">
                <span>Saveetha Engineering College</span>•<span>AICTE Idea Lab Ambassador</span>
            </div>
        </footer>
    </div>

    <!-- CHAT TERMINAL LAYER -->
    <div class="fixed bottom-6 right-6 z-50 font-sans text-sm flex flex-col items-end">
        <div id="chat-pop-up" class="mb-3 bg-neutral-900/90 border border-neutral-800 shadow-xl px-4 py-3 rounded-xl max-w-xs transition-all duration-500 transform translate-y-2 opacity-0 flex items-start gap-3 backdrop-blur-md">
            <div class="w-2 h-2 rounded-full bg-blue-500 mt-1.5 animate-pulse shrink-0"></div>
            <div>
                <p class="font-bold text-xs text-white">Jayasankar's Assistant</p>
                <p class="text-neutral-400 text-xs mt-0.5 leading-normal">Hi! Looking to collaborate on an IoT project? Ask me anything.</p>
            </div>
            <button onclick="dismissPopup(event)" class="text-neutral-500 text-xs font-bold px-1">×</button>
        </div>

        <div id="chat-window" class="w-[340px] sm:w-[360px] h-[460px] bg-neutral-900 border border-neutral-800 rounded-2xl shadow-2xl flex flex-col mb-4 overflow-hidden">
            <div class="bg-neutral-950 text-white px-4 py-4 flex justify-between items-center border-b border-neutral-800">
                <div class="flex items-center gap-2.5">
                    <div class="relative">
                        <img src="https://github.com/jayasankar2007/personalsite/blob/main/05%5B16%5D%20(1).jpg?raw=true" class="w-8 h-8 rounded-full object-cover border border-neutral-800 bg-neutral-900">
                        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-neutral-950 rounded-full"></span>
                    </div>
                    <div>
                        <h4 class="font-display font-bold text-xs">Core-AI Terminal</h4>
                        <p class="text-[10px] text-neutral-400">Automated Assistant Node</p>
                    </div>
                </div>
                <button onclick="toggleChat()" class="text-neutral-400 hover:text-white text-lg">✕</button>
            </div>
            <div id="chat-stream" class="flex-1 p-4 overflow-y-auto space-y-4 bg-neutral-950/40">
                <div class="flex gap-2.5 items-start max-w-[85%]">
                    <div class="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-white font-mono text-[10px] shrink-0 font-bold">🤖</div>
                    <div class="bg-neutral-900 border border-neutral-800 px-3 py-2.5 rounded-2xl rounded-tl-none text-xs text-neutral-300">
                        Welcome. I can provide details regarding Jayasankar's hardware build expertise, Project SafeStitch, or his experience at SEIL Energy. What are you looking to build?
                    </div>
                </div>
            </div>
            <form id="chat-form" onsubmit="handleUserMessage(event)" class="p-3 bg-neutral-900 border-t border-neutral-800 flex gap-2">
                <input id="chat-input" type="text" placeholder="Inquire about hardware specs..." autocomplete="off" class="flex-1 text-xs px-3 py-2.5 bg-neutral-950 border border-neutral-800 text-white rounded-xl focus:outline-none focus:border-blue-600">
                <button type="submit" class="bg-blue-600 text-white font-bold text-xs px-4 py-2 rounded-xl shrink-0">Send</button>
            </form>
        </div>

        <button onclick="toggleChat()" class="w-12 h-12 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center group relative">
            <span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-emerald-500 rounded-full border-2 border-neutral-950 animate-ping"></span>
            <span class="absolute -top-0.5 -right-0.5 w-3 h-3 bg-emerald-500 rounded-full border-2 border-neutral-950"></span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 20, duration: 600, easing: 'ease-out' });

        // Immutable structural dataset cache matrix
        let schema = {
          "profile": {
            "hero_title": "Operating at the Vector Intersections",
            "hero_bio": "Developing embedded system architectures, low-cost IoT hardware modifications, and automated agentic AI workflows.",
            "email": "jayasankar4projects@gmail.com",
            "linkedin_url": "https://www.linkedin.com"
          },
          "sections": [
            {
              "id": "overview", "heading": "Core Matrix Architecture", "subheading": "Primary Technical Focus Areas",
              "items": [
                { "title": "01 // Hardware", "description": "ESP32 microprocessors, sensor array calibration, physical automated relays, and asynchronous packet transfer protocols." },
                { "title": "02 // Automation", "description": "Autonomous multi-step orchestration workflows configured across Make.com engines paired with structural language parsing frames." },
                { "title": "03 // Verification", "description": "Precision electronic blueprinting and functional validation using Cadence Virtuoso, terminal environments, and LTspice simulation maps." }
              ]
            },
            {
              "id": "deployments", "heading": "Selected Deployments", "subheading": "Engineering solutions, functional prototypes, and software platforms.",
              "items": [
                { "title": "Safety-Enhanced Stitching Machine Ecosystem (Project SafeStitch)", "description": "Engineered a custom hardware safety modification framework utilizing high-speed infrared optical sensor arrays mapped to low-latency microcontroller processing loops to prevent industrial needle injuries." },
                { "title": "Asynchronous IoT Threat Interceptor", "description": "Assembled a physical secure tracking asset executing low-latency asynchronous server architectures on microprocessors to deploy localized relay warnings." },
                { "title": "Autonomous Agentic Automations", "description": "Engineered production automated routines integrating multi-app logic modules to handle multi-step semantic actions without manual processing overhead." }
              ]
            },
            {
              "id": "track", "heading": "Professional Track Record", "subheading": "Institutional experience and technical operational background.",
              "items": [
                { "title": "Engineering Intern — SEIL Energy India Limited", "description": "Analyzed active plant telemetry networks, control mechanisms, and large-scale protection infrastructure systems in live utility grid nodes (Jul 2025 – Aug 2025)." },
                { "title": "Workshop Trainer — Systems Orchestration", "description": "Designed, structured, and presented comprehensive engineering courses introducing student clusters to systemic prompt orchestration and Make.com integrations." }
              ]
            }
          ]
        };

        window.addEventListener('DOMContentLoaded', () => {
            // First, try loading external runtime file modifications if they exist safely
            fetch('./data.json')
                .then(res => res.json())
                .then(networkData => {
                    if(networkData.hero_title) schema.profile.hero_title = networkData.hero_title;
                    if(networkData.hero_bio) schema.profile.hero_bio = networkData.hero_bio;
                    if(networkData.email) schema.profile.email = networkData.email;
                    if(networkData.linkedin_url) schema.profile.linkedin_url = networkData.linkedin_url;
                    loadDynamicArchitecture();
                })
                .catch(() => {
                    // Fallback directly to local schema properties if fetch fails
                    loadDynamicArchitecture();
                });

            setTimeout(() => {
                const popup = document.getElementById('chat-pop-up');
                if(popup) popup.classList.remove('translate-y-2', 'opacity-0');
            }, 2500);
        });

        function loadDynamicArchitecture() {
            const profile = schema.profile;
            const nav = document.getElementById('dynamic-nav');
            const viewport = document.getElementById('dynamic-viewport');
            
            nav.innerHTML = ""; viewport.innerHTML = "";

            document.getElementById('cms-email-btn').href = `mailto:${profile.email}`;
            document.getElementById('cms-linkedin-btn').href = profile.linkedin_url;

            schema.sections.forEach((sec, index) => {
                const activeNavClass = index === 0 ? 'nav-active' : '';
                const cleanNavName = sec.heading.includes('//') ? sec.heading.split('//').pop().trim() : sec.heading;
                
                nav.insertAdjacentHTML('beforeend', `
                    <button onclick="switchView('${sec.id}')" id="nav-${sec.id}" class="${activeNavClass} pb-1 border-b-2 border-transparent hover:text-white transition-colors">
                        ${cleanNavName}
                    </button>
                `);

                let cardsHtml = '';
                sec.items.forEach((item, itemIndex) => {
                    cardsHtml += `
                        <div class="glass-card p-6 rounded-2xl space-y-3">
                            <h4 class="font-display font-bold text-white tracking-tight text-base">${item.title}</h4>
                            <p class="text-xs text-neutral-400 font-light leading-relaxed">${item.description}</p>
                        </div>
                    `;
                });

                let contentHtml = `
                    <div class="space-y-1">
                        <h2 class="text-2xl font-display font-bold text-white tracking-tight neon-text-glow">${sec.heading}</h2>
                        <p class="text-xs text-neutral-400">${sec.subheading}</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6">${cardsHtml}</div>
                `;

                if (sec.id === 'overview') {
                    contentHtml = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start mb-12 pb-12 border-b border-neutral-800">
                            <div class="md:col-span-2 space-y-6">
                                <h1 class="text-4xl md:text-5xl font-display font-bold text-white tracking-tight leading-none">${profile.hero_title}</h1>
                                <p class="text-base text-neutral-400 font-light leading-relaxed max-w-xl">${profile.hero_bio}</p>
                            </div>
                            <div class="flex justify-start md:justify-end">
                                <div class="relative group">
                                    <div class="absolute -inset-0.5 shimmer-bar rounded-full blur-sm opacity-70"></div>
                                    <img src="https://github.com/jayasankar2007/personalsite/blob/main/05%5B16%5D%20(1).jpg?raw=true" class="relative w-28 h-28 md:w-32 md:h-32 rounded-full object-cover border border-neutral-800 bg-neutral-900">
                                </div>
                            </div>
                        </div>
                        <div class="space-y-1"><h2 class="text-xs font-bold uppercase tracking-wider text-neutral-500">${sec.subheading}</h2></div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-6">${cardsHtml}</div>
                    `;
                }

                viewport.insertAdjacentHTML('beforeend', `
                    <div id="view-${sec.id}" class="view-panel ${index === 0 ? 'active-view' : ''} space-y-6">
                        ${contentHtml}
                    </div>
                `);
            });
            AOS.refresh();
        }

        // Window Switch Router Core Functionality
        window.switchView = function(viewId) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-view'));
            document.querySelectorAll('#dynamic-nav button').forEach(b => b.classList.remove('nav-active'));
            
            const targetView = document.getElementById(`view-${viewId}`);
            const targetNav = document.getElementById(`nav-${viewId}`);
            
            if(targetView) targetView.classList.add('active-view');
            if(targetNav) targetNav.classList.add('nav-active');
            AOS.refresh();
        };

        window.toggleChat = function() {
            document.getElementById('chat-window').classList.toggle('open');
        };
        window.dismissPopup = function(e) {
            e.stopPropagation();
            document.getElementById('chat-pop-up').style.display = 'none';
        };
    </script>
</body>
</html>

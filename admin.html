<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Modular Panel Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #060911; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="text-slate-200 min-h-screen py-10 px-4 flex flex-col items-center">

    <div class="w-full max-w-4xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-6">
        
        <!-- DASHBOARD HEADER SECURITY LINE -->
        <div class="border-b border-slate-800 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-xl font-display font-bold text-white tracking-tight flex items-center gap-2">
                    <span>⚡</span> Precision Micro-Patch Panel
                </h1>
                <p class="text-xs text-slate-500 mt-1">Saves changes instantly item-by-item without disturbing the rest of your site layout.</p>
            </div>
            
            <div class="w-full md:w-64 space-y-1">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">GitHub Access Token (PAT)</label>
                <input id="github-token" type="password" placeholder="ghp_..." class="w-full text-xs px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-slate-300 transition-all">
            </div>
        </div>

        <!-- GLOBAL OPERATION NOTIFICATION BOX -->
        <div id="status-box" class="hidden text-xs p-3 rounded-xl border font-mono"></div>

        <!-- CORE LAYOUT WORKING TILES -->
        <div class="space-y-6">
            <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider font-mono">🧱 Isolated Layout Sub-Modules</h2>
                <button onclick="addNewViewField()" class="bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all">
                    + Insert New Page Window
                </button>
            </div>

            <div id="workspace-container" class="space-y-6">
                <!-- JavaScript automatically mounts structural editor tiles here -->
                <p class="text-xs text-slate-500 italic animate-pulse">Syncing matrix modules from repository maps...</p>
            </div>
        </div>

    </div>

    <script>
        const REPO = "jayasankar2007/personalsite";
        let currentFileSha = "";
        let siteStructureMap = { profile: {}, custom_views: [] };

        window.addEventListener('DOMContentLoaded', async () => {
            const savedToken = localStorage.getItem('admin_git_token');
            if(savedToken) document.getElementById('github-token').value = savedToken;
            await loadSystemDataMap();
        });

        async function loadSystemDataMap() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`);
                if(!res.ok) return;
                const fileObj = await res.json();
                currentFileSha = fileObj.sha;
                siteStructureMap = JSON.parse(atob(fileObj.content));
                
                // Set default views if clean array missing
                if(!siteStructureMap.custom_views) siteStructureMap.custom_views = [];
                
                renderInteractiveWorkspace();
            } catch (err) {
                showStatus("Failed connection routine loading system property files.", "error");
            }
        }

        function renderInteractiveWorkspace() {
            const container = document.getElementById('workspace-container');
            container.innerHTML = "";

            // 1. ISOLATED PROFILE BLOCK COMPONENT WITH LOCALIZED SAVE
            let profileHtml = `
                <div class="p-5 bg-slate-950 border border-slate-800 rounded-xl space-y-4 relative">
                    <div class="flex justify-between items-center border-b border-slate-900 pb-2">
                        <span class="text-xs font-bold text-blue-400 font-mono">👤 PROFILE PARAMETER OBJECT</span>
                        <button onclick="patchProfileComponent(this)" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-1.5 rounded-lg transition-all flex items-center gap-1 shadow-md shadow-blue-950/50">
                            Save Profile Only ↗
                        </button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div class="space-y-1"><label class="text-[10px] uppercase font-mono tracking-wider text-slate-500">Hero Title</label><input type="text" id="core-title" value="${siteStructureMap.profile?.hero_title || ''}" class="w-full text-xs p-2 bg-slate-900 border border-slate-800 rounded text-white"></div>
                        <div class="space-y-1"><label class="text-[10px] uppercase font-mono tracking-wider text-slate-500">Contact Email</label><input type="text" id="core-email" value="${siteStructureMap.profile?.email || ''}" class="w-full text-xs p-2 bg-slate-900 border border-slate-800 rounded text-white"></div>
                        <div class="space-y-1 sm:col-span-2"><label class="text-[10px] uppercase font-mono tracking-wider text-slate-500">LinkedIn URL Path</label><input type="text" id="core-linkedin" value="${siteStructureMap.profile?.linkedin_url || ''}" class="w-full text-xs p-2 bg-slate-900 border border-slate-800 rounded text-white"></div>
                        <div class="space-y-1 sm:col-span-2"><label class="text-[10px] uppercase font-mono tracking-wider text-slate-500">Biography Core Block Description</label><textarea id="core-bio" rows="3" class="w-full text-xs p-2 bg-slate-900 border border-slate-800 rounded text-white resize-none font-mono leading-relaxed">${siteStructureMap.profile?.hero_bio || ''}</textarea></div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', profileHtml);

            // 2. ISOLATED APPS WINDOW TILES WITH INDEPENDENT UPDATE BUTTONS
            siteStructureMap.custom_views.forEach((view, index) => {
                let viewCard = `
                    <div class="p-5 bg-slate-950 border border-slate-800 rounded-xl space-y-4 relative">
                        <div class="flex flex-wrap justify-between items-center border-b border-slate-900 pb-2 gap-2">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-amber-500 font-mono">🗔 SECTION WINDOW // [${index}]</span>
                                <input type="text" id="view-name-${index}" value="${view.name}" class="text-xs font-bold bg-slate-900 border border-slate-700 px-2 py-0.5 rounded text-white w-32">
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="deleteViewWindow(${index}, this)" class="text-red-400 hover:text-red-300 text-xs font-bold font-mono px-1">✕ Delete Section</button>
                                <button onclick="patchViewWindowComponent(${index}, this)" class="bg-amber-600 hover:bg-amber-700 text-white text-xs font-bold px-4 py-1.5 rounded-lg transition-all flex items-center gap-1 shadow-md shadow-amber-950/50">
                                    Save This Window ↗
                                </button>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="block text-[10px] uppercase font-mono tracking-wider text-slate-500">HTML Dynamic Body Blueprint Content</label>
                            <textarea id="view-content-${index}" rows="6" class="w-full text-xs p-3 bg-slate-900 border border-slate-800 rounded text-white font-mono leading-relaxed resize-none">${view.content}</textarea>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', viewCard);
            });
        }

        // PATCH EXECUTION: MODIFIES ONLY THE PROFILE ELEMENT BLOCK VALUES
        async function patchProfileComponent(btnHandle) {
            const token = getValidToken(); if(!token) return;
            setBtnLoadingState(btnHandle, true, "Saving...");

            siteStructureMap.profile = {
                hero_title: document.getElementById('core-title').value,
                hero_bio: document.getElementById('core-bio').value,
                email: document.getElementById('core-email').value,
                linkedin_url: document.getElementById('core-linkedin').value
            };

            await pushDatabaseMutation(token, btnHandle, "profile node structural property alignment");
        }

        // PATCH EXECUTION: MODIFIES ONLY THE TARGET VIEW SUB-ARRAY NODE VALUE
        async function patchViewWindowComponent(index, btnHandle) {
            const token = getValidToken(); if(!token) return;
            setBtnLoadingState(btnHandle, true, "Saving...");

            const updatedName = document.getElementById(`view-name-${index}`).value;
            siteStructureMap.custom_views[index] = {
                id: updatedName.toLowerCase().replace(/[^a-z0-9]/g, ''),
                name: updatedName,
                active: index === 0,
                content: document.getElementById(`view-content-${index}`).value
            };

            await pushDatabaseMutation(token, btnHandle, `window node configuration adjustments pushed to view [${index}]`);
        }

        // NEW MODULE GENERATION
        function addNewViewField() {
            siteStructureMap.custom_views.push({
                id: "window" + Date.now().toString().slice(-3),
                name: "New Page Tab",
                active: false,
                content: `<div class="space-y-4">\n  <h2 class="text-xl font-display font-bold text-neutral-900">Custom Headline</h2>\n  <p class="text-xs text-neutral-500">Write custom content segments here.</p>\n</div>`
            });
            renderInteractiveWorkspace();
            showStatus("New modular layout block added to your workspace workspace canvas container below. Click its dedicated save button to register it live.", "info");
        }

        // REMOVAL ROUTINE RUNNING DIRECTLY AGAINST TARGET NODE
        async function deleteViewWindow(index, btnHandle) {
            const token = getValidToken(); if(!token) return;
            if(!confirm("Are you completely sure you want to drop this page section out of your live layout architecture tree?")) return;
            
            setBtnLoadingState(btnHandle, true, "Deleting...");
            siteStructureMap.custom_views.splice(index, 1);
            await pushDatabaseMutation(token, btnHandle, "structural component window sequence removal complete");
        }

        // UNILATERAL REST API TRANSLATION LAYER FOR COMMITTING LOCAL MUTATIONS
        async function pushDatabaseMutation(token, btnHandle, logMessage) {
            try {
                const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(siteStructureMap, null, 2))));
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `console patch engine: ${logMessage}`,
                        content: base64Content,
                        sha: currentFileSha
                    })
                });

                if(response.ok) {
                    const data = await response.json();
                    currentFileSha = data.content.sha; // Capture fresh tree SHA footprint tracking reference instantly
                    showStatus("Success! Section updated cleanly in under 2 seconds.", "success");
                } else {
                    const err = await response.json();
                    showStatus(`GitHub API Rejected Push: ${err.message}`, "error");
                }
            } catch (ex) {
                showStatus("Network socket transmission processing fault.", "error");
            } finally {
                setBtnLoadingState(btnHandle, false);
                renderInteractiveWorkspace(); // Refresh canvas loops to update sync coordinates
            }
        }

        function getValidToken() {
            const t = document.getElementById('github-token').value.trim();
            if(!t) { showStatus("Please set your GitHub Access Key Token field before triggering state mutations.", "error"); return null; }
            localStorage.setItem('admin_git_token', t);
            return t;
        }

        function setBtnLoadingState(btn, isLoading, placeholderText = "") {
            if(isLoading) {
                btn.disabled = true;
                btn.dataset.oldText = btn.innerText;
                btn.innerText = placeholderText;
                btn.style.opacity = "0.6";
            } else {
                btn.disabled = false;
                btn.innerText = btn.dataset.oldText || "Save";
                btn.style.opacity = "1";
            }
        }

        function showStatus(text, type) {
            const box = document.getElementById('status-box');
            box.className = "text-xs p-3 rounded-xl border font-mono";
            if(type === 'error') box.classList.add('bg-red-950', 'border-red-800', 'text-red-400');
            if(type === 'success') box.classList.add('bg-emerald-950', 'border-emerald-800', 'text-emerald-400');
            if(type === 'info') box.classList.add('bg-slate-950', 'border-slate-800', 'text-slate-400');
            box.innerText = text; box.classList.remove('hidden');
            setTimeout(() => { box.classList.add('hidden'); }, 4000);
        }
    </script>
</body>
</html>

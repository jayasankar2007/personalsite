<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Control Center // Authorized Administration Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; } 
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        .neon-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        @keyframes dynamicShimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .shimmer-bar { background: linear-gradient(-45deg, #3b82f6, #60a5fa, #34d399, #818cf8); background-size: 400% 400%; animation: dynamicShimmer 6s ease infinite; }
    </style>
</head>
<body class="text-slate-200 min-h-screen pb-24 relative antialiased">

    <div class="fixed top-0 left-0 w-full h-1.5 shimmer-bar z-50"></div>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-12">
        
        <!-- SECURITY GATEWAY -->
        <div id="login-gate" class="max-w-md mx-auto glass-panel rounded-2xl p-8 mt-20 space-y-6">
            <div class="text-center space-y-2">
                <h2 class="text-2xl font-display font-bold text-white tracking-tight flex items-center justify-center gap-2">
                    🛡️ Cryptographic Gateway
                </h2>
                <p class="text-xs text-slate-400">Provide authorization token to synchronize runtime vectors.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-mono uppercase tracking-wider text-slate-400 mb-1">GitHub Personal Access Token</label>
                    <input id="github-token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" class="w-full text-xs px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500 text-white font-mono tracking-widest">
                </div>
            </div>
            <button onclick="authenticateTerminal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-[0.99]">
                Establish System Handshake
            </button>
        </div>

        <!-- MAIN DASHBOARD -->
        <div id="main-dashboard" class="hidden space-y-8">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-6 border-b border-slate-700">
                <div>
                    <h1 class="text-3xl font-display font-bold text-white tracking-tight neon-glow">⚡ Master Control Console</h1>
                    <p class="text-xs text-slate-400 font-mono mt-1">Dynamic orchestration node // Live diagnostics module.</p>
                </div>
                <div class="flex flex-wrap gap-3 w-full md:w-auto">
                    <button onclick="runDeepSystemDiagnosis()" class="bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 text-xs font-bold px-5 py-3.5 rounded-xl border border-amber-900/40 transition-all flex items-center gap-2 shadow-sm">
                        🔍 Deep System Scan
                    </button>
                    <button onclick="saveEverythingLive()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xs font-bold px-6 py-3.5 rounded-xl transition-all shadow-lg active:scale-[0.98]">
                        Commit Changes & Deploy Live
                    </button>
                </div>
            </header>

            <!-- TELEMETRY STREAMS -->
            <div id="diagnostics-log-box" class="hidden glass-panel p-5 rounded-2xl border border-amber-500/30 bg-amber-950/20 space-y-2 font-mono text-xs">
                <span id="diag-header-status" class="font-bold text-amber-400 uppercase tracking-wider">🔬 Telemetry Scan Logs</span>
                <div id="diag-terminal-stream" class="space-y-1 text-slate-300 max-h-[150px] overflow-y-auto"></div>
            </div>

            <div id="status-box" class="hidden text-xs p-4 rounded-xl border font-mono tracking-wide"></div>

            <!-- LAYOUT PANEL CONTROLS -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                
                <!-- PREV PROFILE METRICS + KEY SLOTS -->
                <div class="lg:col-span-1 space-y-6">
                    <div class="glass-panel p-6 rounded-2xl space-y-6">
                        <h3 class="text-xs font-mono font-bold uppercase tracking-widest text-blue-400 border-b border-slate-700 pb-2">01 // Identity Vectors</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-mono uppercase text-slate-400 mb-1">Hero Display Name</label>
                                <input id="hero-title" type="text" class="w-full text-xs px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-mono uppercase text-slate-400 mb-1">Contact Routing Email</label>
                                <input id="hero-email" type="text" class="w-full text-xs px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-mono uppercase text-slate-400 mb-1">LinkedIn URL Link</label>
                                <input id="hero-linkedin" type="text" class="w-full text-xs px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-mono uppercase text-slate-400 mb-1">🔑 Neural Chatbot API Key (AQ. Auth Format)</label>
                                <input id="hero-gemini-key" type="password" placeholder="Paste your AQ.Ab8RN6... key here" class="w-full text-xs px-3 py-2.5 bg-slate-950 border border-amber-900/50 text-amber-300 rounded-xl focus:outline-none font-mono">
                            </div>
                            <div>
                                <label class="block text-[10px] font-mono uppercase text-slate-400 mb-1">Biographical Bio Narrative</label>
                                <textarea id="hero-bio" rows="4" class="w-full text-xs px-3 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none resize-none font-mono text-left"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- NAVIGATION WORKSPACE GRID -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-panel p-6 rounded-2xl space-y-4">
                        <div class="flex items-center justify-between border-b border-slate-700 pb-3">
                            <h3 class="text-xs font-mono font-bold uppercase tracking-widest text-blue-400">02 // Interface Node Management</h3>
                            <button onclick="addNewSection()" class="bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 text-xs font-bold px-3 py-1.5 rounded-lg border border-blue-900/40 transition-all">
                                Add Section +
                            </button>
                        </div>
                        <div id="sections-container" class="space-y-6 pt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REPO = "jayasankar2007/personalsite";
        let currentSha = "";
        let siteConfig = {};

        function authenticateTerminal() {
            const token = document.getElementById('github-token').value.trim();
            if(!token) return alert("Access credentials required.");
            
            fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            })
            .then(res => res.json())
            .then(fileData => {
                currentSha = fileData.sha;
                const decodedString = decodeURIComponent(escape(atob(fileData.content.replace(/\s/g, ''))));
                siteConfig = JSON.parse(decodedString);
                
                localStorage.setItem('admin_session_token', token);
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                
                const profile = siteConfig.profile || siteConfig;
                document.getElementById('hero-title').value = profile.hero_title || '';
                document.getElementById('hero-bio').value = profile.hero_bio || '';
                document.getElementById('hero-email').value = profile.email || '';
                document.getElementById('hero-linkedin').value = profile.linkedin_url || '';
                document.getElementById('hero-gemini-key').value = siteConfig.gemini_key || profile.gemini_key || '';

                renderEditorDashboard();
            })
            .catch(err => alert("Verification failed. Check token parameters."));
        }

        async function runDeepSystemDiagnosis() {
            const logBox = document.getElementById('diagnostics-log-box');
            const stream = document.getElementById('diag-terminal-stream');
            logBox.style.display = 'block';
            stream.innerHTML = "";

            const activeKey = document.getElementById('hero-gemini-key').value.trim() || siteConfig.gemini_key;
            if (activeKey && activeKey.startsWith("AQ.")) {
                stream.innerHTML += `<p class='text-emerald-400'>[PASS] 2026 Authorization key configuration detected inside database loop.</p>`;
            } else {
                stream.innerHTML += `<p class='text-red-400'>[FAIL] Missing or incorrect chatbot key format. Ensure key starts with 'AQ.'.</p>`;
            }
            if(siteConfig.sections) {
                stream.innerHTML += `<p class='text-emerald-400'>[PASS] Interface tabs arrays intact (${siteConfig.sections.length} active arrays mapped).</p>`;
            }
        }

        function renderEditorDashboard() {
            const container = document.getElementById('sections-container');
            container.innerHTML = "";
            const sections = siteConfig.sections || [];

            sections.forEach((sec, sIdx) => {
                let itemsHtml = '';
                const items = sec.items || [];
                
                items.forEach((item, iIdx) => {
                    itemsHtml += `
                        <div class="p-4 bg-slate-900 border border-slate-800 rounded-xl space-y-3 relative">
                            <div class="flex justify-between items-center border-b border-slate-950 pb-1.5">
                                <span class="text-[9px] font-mono text-blue-400 font-bold uppercase tracking-wider">CARD MODULE #0${iIdx + 1}</span>
                                <button onclick="deleteItem(${sIdx}, ${iIdx})" class="text-[9px] font-mono text-red-400 font-bold">Delete ×</button>
                            </div>
                            <div class="space-y-2">
                                <input type="text" value="${item.title}" oninput="siteConfig.sections[${sIdx}].items[${iIdx}].title = this.value" class="w-full text-xs px-2.5 py-1.5 bg-slate-950 border border-slate-800 text-white rounded-lg focus:outline-none font-bold">
                                <textarea oninput="siteConfig.sections[${sIdx}].items[${iIdx}].description = this.value" rows="3" class="w-full text-xs p-2.5 bg-slate-950 border border-slate-800 text-slate-300 rounded-lg focus:outline-none resize-none font-mono">${item.description}</textarea>
                            </div>
                        </div>
                    `;
                });

                container.insertAdjacentHTML('beforeend', `
                    <div class="workspace-card bg-slate-900/30 border border-slate-800 p-5 rounded-xl space-y-4">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                            <div class="flex items-center gap-3">
                                <div class="bg-blue-50/10 text-blue-400 text-xs px-2 py-0.5 rounded font-mono font-bold">${sec.id.toUpperCase()}</div>
                                <input type="text" value="${sec.heading}" oninput="siteConfig.sections[${sIdx}].heading = this.value" class="text-sm bg-transparent text-white font-bold focus:outline-none">
                            </div>
                            <button onclick="deleteSection(${sIdx})" class="text-[10px] font-mono bg-red-950/20 text-red-400 px-2.5 py-1 rounded-lg">Remove Tab ✕</button>
                        </div>
                        <div class="space-y-3 pl-3 border-l-2 border-slate-800">
                            ${itemsHtml}
                            <button onclick="addNewItemToSection(${sIdx})" class="w-full text-[10px] bg-slate-950 text-blue-400 font-bold py-2 rounded-xl border border-slate-800 border-dashed">
                                + Add Component Card Module
                            </button>
                        </div>
                    </div>
                `);
            });
        }

        function addNewSection() { siteConfig.sections.push({ id: "tab_" + Date.now().toString().slice(-4), heading: "Custom Section", items: [] }); renderEditorDashboard(); }
        function deleteSection(sIdx) { if(confirm("Clear target page structural section?")) { siteConfig.sections.splice(sIdx, 1); renderEditorDashboard(); } }
        function addNewItemToSection(sIdx) { siteConfig.sections[sIdx].items.push({ title: "New Component Title", description: "Write engineering log updates here." }); renderEditorDashboard(); }
        function deleteItem(sIdx, iIdx) { siteConfig.sections[sIdx].items.splice(iIdx, 1); renderEditorDashboard(); }

        async function saveEverythingLive() {
            const token = localStorage.getItem('admin_session_token');
            const box = document.getElementById('status-box');
            
            siteConfig.gemini_key = document.getElementById('hero-gemini-key').value.trim();
            if(!siteConfig.profile) siteConfig.profile = {};
            
            siteConfig.profile.hero_title = document.getElementById('hero-title').value;
            siteConfig.profile.hero_bio = document.getElementById('hero-bio').value;
            siteConfig.profile.email = document.getElementById('hero-email').value;
            siteConfig.profile.linkedin_url = document.getElementById('hero-linkedin').value;

            box.className = "text-xs p-4 rounded-xl border font-mono bg-blue-950/60 text-blue-400 border-blue-900/60 block";
            box.innerText = "Synchronizing complete database schemas live to main cluster repository...";
            
            try {
                const checkRes = await fetch::(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if(checkRes.ok) {
                    const freshData = await checkRes.json();
                    currentSha = freshData.sha;
                }

                const jsonString = JSON.stringify(siteConfig, null, 2);
                const finalContent = btoa(unescape(encodeURIComponent(jsonString)));

                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "admin_console: telemetry dataset matrix locked", content: finalContent, sha: currentSha })
                });

                if(response.ok) {
                    const resJson = await response.json();
                    currentSha = resJson.content.sha;
                    box.className = "text-xs p-4 rounded-xl border font-mono bg-emerald-950/60 text-emerald-400 border-emerald-900/60 block";
                    box.innerText = "Deployment Matrix Success! Chatbot channels and layout elements are synchronized live.";
                } else { throw new Error("Server denied data stream serialization."); }
            } catch(e) {
                box.className = "text-xs p-4 rounded-xl border font-mono bg-red-950/60 text-red-400 border-red-900/60 block";
                box.innerText = "System Pipeline Fault: " + e.message;
            }
        }
    </script>
</body>
</html>

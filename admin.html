<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Terminal Panel // Secure Control Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; }
        .glass-card {
            background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .shimmer-bar { background: linear-gradient(-45deg, #2563eb, #3b82f6, #10b981, #6366f1); background-size: 400% 400%; }
    </style>
</head>
<body class="text-neutral-300 antialiased min-h-screen py-10 px-4 flex flex-col items-center relative font-sans">
    <div class="fixed top-0 left-0 w-full h-1.5 shimmer-bar z-50"></div>

    <div id="login-gate" class="w-full max-w-md glass-card rounded-2xl p-6 mt-20 space-y-4">
        <h2 class="text-xl font-display font-bold text-white tracking-tight">🛡️ Security Gateway</h2>
        <div class="space-y-3">
            <input id="github-token" type="password" placeholder="GitHub PAT Token (Password)" class="w-full text-sm px-3 py-2.5 bg-neutral-950 border border-neutral-800 text-white rounded-xl focus:outline-none">
        </div>
        <button onclick="authenticateTerminal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 rounded-xl transition-colors">Initialize Connection</button>
    </div>

    <div id="main-dashboard" class="hidden w-full max-w-4xl bg-neutral-900/40 border border-neutral-800 backdrop-blur-md rounded-2xl p-6 shadow-2xl space-y-6 mt-6">
        <div class="border-b border-neutral-800 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">⚡ Master Control Console</h1>
                <p class="text-xs text-neutral-500">Authorized structural parameter configuration module.</p>
            </div>
            <button onclick="saveEverythingLive()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-6 py-2.5 rounded-xl transition-colors shadow-md">Deploy Changes Live</button>
        </div>

        <div id="status-box" class="hidden text-xs p-3 rounded-xl border font-mono"></div>

        <div class="bg-neutral-950/60 border border-neutral-800 p-5 rounded-xl space-y-4">
            <h3 class="text-xs font-bold uppercase tracking-wider text-blue-500">01 // Primary Information Properties</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <input id="hero-title" type="text" placeholder="Hero Title" class="w-full text-sm px-3 py-2.5 bg-neutral-900 border border-neutral-800 text-white rounded-xl focus:outline-none">
                <input id="hero-email" type="text" placeholder="Contact Email" class="w-full text-sm px-3 py-2.5 bg-neutral-900 border border-neutral-800 text-white rounded-xl focus:outline-none">
            </div>
            <textarea id="hero-bio" rows="3" placeholder="Hero Biography Summary" class="w-full text-sm px-3 py-2.5 bg-neutral-900 border border-neutral-800 text-white rounded-xl focus:outline-none resize-none"></textarea>
            <input id="hero-linkedin" type="text" placeholder="LinkedIn URL" class="w-full text-sm px-3 py-2.5 bg-neutral-900 border border-neutral-800 text-white rounded-xl focus:outline-none">
        </div>
    </div>

    <script>
        const REPO = "jayasankar2007/personalsite";
        let currentSha = "";
        let siteConfig = {};

        function authenticateTerminal() {
            const token = document.getElementById('github-token').value.trim();
            fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, { headers: { 'Authorization': `token ${token}` } })
            .then(res => res.json())
            .then(fileData => {
                currentSha = fileData.sha;
                siteConfig = JSON.parse(atob(fileData.content));
                localStorage.setItem('admin_session_token', token);
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                
                document.getElementById('hero-title').value = siteConfig.hero_title || siteConfig.profile?.hero_title || '';
                document.getElementById('hero-bio').value = siteConfig.hero_bio || siteConfig.profile?.hero_bio || '';
                document.getElementById('hero-email').value = siteConfig.email || siteConfig.profile?.email || '';
                document.getElementById('hero-linkedin').value = siteConfig.linkedin_url || siteConfig.profile?.linkedin_url || '';
            }).catch(() => alert(" Clear identification parameters rejected. Ensure token string is valid."));
        }

        async function saveEverythingLive() {
            const token = localStorage.getItem('admin_session_token');
            const box = document.getElementById('status-box');
            
            const payload = {
                hero_title: document.getElementById('hero-title').value,
                hero_bio: document.getElementById('hero-bio').value,
                email: document.getElementById('hero-email').value,
                linkedin_url: document.getElementById('hero-linkedin').value
            };

            box.className = "text-xs p-3 rounded-xl border font-mono bg-blue-950 text-blue-400 border-blue-900 block";
            box.innerText = "Synchronizing deployment metrics to origin...";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "terminal update: profile layer realignment", content: btoa(JSON.stringify(payload, null, 2)), sha: currentSha })
                });

                if(response.ok) {
                    const resJson = await response.json(); currentSha = resJson.content.sha;
                    box.className = "text-xs p-3 rounded-xl border font-mono bg-emerald-950 text-emerald-400 border-emerald-900 block";
                    box.innerText = "Deployment Success! Parameters successfully realigned across target grids.";
                } else { throw new Error("GitHub master connection deployment handshake failure."); }
            } catch(e) {
                box.className = "text-xs p-3 rounded-xl border font-mono bg-red-950 text-red-400 border-red-900 block";
                box.innerText = "Pipeline Lockout: " + e.message;
            }
        }
    </script>
</body>
</html>

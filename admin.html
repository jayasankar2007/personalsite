<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Terminal // Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #090d16; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-6">
        <!-- Header -->
        <div class="border-b border-slate-800 pb-4">
            <h1 class="text-xl font-display font-bold text-white tracking-tight flex items-center gap-2">
                <span>⚡</span> Jayasankar.g // Control Console
            </h1>
            <p class="text-xs text-slate-500 mt-1">Direct API engine link bypassing third-party CMS architectures.</p>
        </div>

        <!-- Token Entry (Saved to Local Browser Storage) -->
        <div class="space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">GitHub Access Key (PAT)</label>
            <input id="github-token" type="password" placeholder="Paste your github_pat_..." class="w-full text-xs px-3 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-slate-300 transition-all">
        </div>

        <hr class="border-slate-800">

        <!-- Form Fields -->
        <form id="admin-form" onsubmit="saveData(event)" class="space-y-4">
            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400">Main Hero Title</label>
                <input id="form-title" type="text" required class="w-full text-sm px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-white">
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-medium text-slate-400">Biography Card Text</label>
                <textarea id="form-bio" rows="4" required class="w-full text-sm px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-white resize-none"></textarea>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400">LinkedIn URL</label>
                    <input id="form-linkedin" type="url" required class="w-full text-xs px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                </div>
                <div class="space-y-1.5">
                    <label class="block text-xs font-medium text-slate-400">Contact Email</label>
                    <input id="form-email" type="email" required class="w-full text-xs px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-white">
                </div>
            </div>

            <!-- Status Indicator and Submit Button -->
            <div id="status-box" class="hidden text-xs p-3 rounded-xl border"></div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 rounded-xl transition-colors shadow-lg shadow-blue-900/20">
                Push Live Updates
            </button>
        </form>
    </div>

    <script>
        const REPO = "jayasankar2007/personalsite";
        let currentSha = "";

        // Auto-load token if saved previously in browser storage
        window.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('admin_git_token');
            if(savedToken) document.getElementById('github-token').value = savedToken;
            fetchCurrentData();
        });

        // Pull active parameters down into input fields
        async function fetchCurrentData() {
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`);
                const fileData = await res.json();
                currentSha = fileData.sha; // Save file version hash signature
                
                const content = JSON.parse(atob(fileData.content));
                document.getElementById('form-title').value = content.hero_title || '';
                document.getElementById('form-bio').value = content.hero_bio || '';
                document.getElementById('form-linkedin').value = content.linkedin_url || '';
                document.getElementById('form-email').value = content.email || '';
            } catch (err) {
                showStatus("Could not pull current database properties.", "error");
            }
        }

        // Overwrite and push fresh updates straight up to your GitHub repository
        async function saveData(event) {
            event.preventDefault();
            const token = document.getElementById('github-token').value.trim();
            if(!token) { showStatus("Please enter your GitHub Token.", "error"); return; }
            
            localStorage.setItem('admin_git_token', token); // Save locally for convenience
            showStatus("Encrypting packet data and writing to GitHub API...", "info");

            const updatedPayload = {
                hero_title: document.getElementById('form-title').value,
                hero_bio: document.getElementById('form-bio').value,
                linkedin_url: document.getElementById('form-linkedin').value,
                email: document.getElementById('form-email').value
            };

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "console automation: layout property adjustments pushed via custom dashboard",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedPayload, null, 2)))),
                        sha: currentSha
                    })
                });

                if(response.ok) {
                    showStatus("Success! Your site updates are live on GitHub.", "success");
                    const data = await response.json();
                    currentSha = data.content.sha; // Update current file structural signature
                } else {
                    const errDetails = await response.json();
                    showStatus(`Write Failed: ${errDetails.message || 'Check your token permissions.'}`, "error");
                }
            } catch (err) {
                showStatus("Network execution fault occurred.", "error");
            }
        }

        function showStatus(text, type) {
            const box = document.getElementById('status-box');
            box.classList.remove('hidden', 'bg-red-950', 'border-red-800', 'text-red-400', 'bg-emerald-950', 'border-emerald-800', 'text-emerald-400', 'bg-slate-950', 'border-slate-800', 'text-slate-400');
            
            if(type === 'error') box.classList.add('bg-red-950', 'border-red-800', 'text-red-400');
            if(type === 'success') box.classList.add('bg-emerald-950', 'border-emerald-800', 'text-emerald-400');
            if(type === 'info') box.classList.add('bg-slate-950', 'border-slate-800', 'text-slate-400');
            
            box.innerText = text;
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>

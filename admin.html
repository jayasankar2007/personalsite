<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Terminal Panel // Secure Control Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="text-slate-200 min-h-screen py-10 px-4 flex flex-col items-center">

    <!-- LOGIN GATE LAYER -->
    <div id="login-gate" class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl mt-20 space-y-4">
        <h2 class="text-xl font-display font-bold text-white flex items-center gap-2">🛡️ Security Gateway</h2>
        <div class="space-y-3">
            <input id="admin-id" type="text" placeholder="Admin Terminal ID" class="w-full text-sm px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-white">
            <input id="github-token" type="password" placeholder="GitHub PAT Token (Password)" class="w-full text-sm px-3 py-2 bg-slate-950 border border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 text-white">
        </div>
        <button onclick="authenticateTerminal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-3 rounded-xl transition-colors">Initialize Connection</button>
    </div>

    <!-- MAIN CONTROL MASTER DASHBOARD -->
    <div id="main-dashboard" class="hidden w-full max-w-4xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-6">
        <div class="border-b border-slate-800 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-display font-bold text-white tracking-tight">⚡ Master Control Console</h1>
                <p class="text-xs text-slate-500">Authorized dynamic deployment environment.</p>
            </div>
            <button onclick="saveEverythingLive()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-6 py-2.5 rounded-xl transition-colors shadow-lg shadow-emerald-950/40">Deploy Changes Live</button>
        </div>

        <div id="status-box" class="hidden text-xs p-3 rounded-xl border font-mono"></div>

        <!-- PROFILE PROPERTIES COLUMN -->
        <div class="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-4">
            <h3 class="text-sm font-bold uppercase tracking-wider text-blue-500">01 // Primary Information</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <input id="hero-title" type="text" placeholder="Hero Title" class="text-sm px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none">
                <input id="hero-email" type="text" placeholder="Contact Email" class="text-sm px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none">
            </div>
            <textarea id="hero-bio" rows="3" placeholder="Hero Biography Summary" class="w-full text-sm px-3 py-2 bg-slate-900 border border-slate-800 rounded-xl text-white focus:outline-none resize-none font-mono"></textarea>
        </div>

        <!-- STRUCTURAL SECTIONS LAYOUT CONSOLE -->
        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-sm font-bold uppercase tracking-wider text-blue-500">02 // Custom Page Sections</h3>
                <button onclick="addNewSection()" class="bg-slate-800 hover:bg-slate-700 text-white text-xs px-3 py-1.5 rounded-lg border border-slate-700">Add New Section +</button>
            </div>
            <div id="sections-container" class="space-y-6"></div>
        </div>
    </div>

    <script>
        const REPO = "jayasankar2007/personalsite";
        let currentSha = "";
        let siteConfig = {};

        function authenticateTerminal() {
            const token = document.getElementById('github-token').value.trim();
            if(!token) return alert("Terminal ID password credentials required.");
            
            fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            })
            .then(res => {
                if(!res.ok) throw new Error("Invalid access clearance token key.");
                return res.json();
            })
            .then(fileData => {
                currentSha = fileData.sha;
                siteConfig = JSON.parse(atob(fileData.content));
                localStorage.setItem('admin_session_token', token);
                
                document.getElementById('login-gate').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                renderEditorDashboard();
            })
            .catch(err => alert(err.message));
        }

        function renderEditorDashboard() {
            document.getElementById('hero-title').value = siteConfig.profile.hero_title || '';
            document.getElementById('hero-bio').value = siteConfig.profile.hero_bio || '';
            document.getElementById('hero-email').value = siteConfig.profile.email || '';

            const container = document.getElementById('sections-container');
            container.innerHTML = "";

            siteConfig.sections.forEach((sec, sIdx) => {
                let itemsHtml = '';
                sec.items.forEach((item, iIdx) => {
                    itemsHtml += `
                        <div class="p-3 bg-slate-900 rounded-xl border border-slate-800 space-y-2 relative">
                            <button onclick="deleteItem(${sIdx}, ${iIdx})" class="absolute top-2 right-3 text-red-500 text-xs hover:text-red-400">Remove Item ×</button>
                            <input type="text" value="${item.title}" onchange="updateItemField(${sIdx}, ${iIdx}, 'title', this.value)" placeholder="Item Title/Heading" class="w-1/2 text-xs px-2 py-1 bg-slate-950 border border-slate-800 text-white rounded-md">
                            <textarea onchange="updateItemField(${sIdx}, ${iIdx}, 'description', this.value)" placeholder="Description text content" class="w-full text-xs p-2 bg-slate-950 border border-slate-800 text-slate-300 rounded-md resize-none font-mono">${item.description}</textarea>
                        </div>
                    `;
                });

                container.insertAdjacentHTML('beforeend', `
                    <div class="bg-slate-950 border border-slate-800 p-5 rounded-xl space-y-3 relative">
                        <button onclick="deleteSection(${sIdx})" class="absolute top-4 right-4 text-xs bg-red-950 border border-red-900 text-red-400 px-2 py-1 rounded-md">Delete Page Section ✕</button>
                        <div class="grid grid-cols-3 gap-2">
                            <input type="text" value="${sec.heading}" onchange="updateSectionField(${sIdx}, 'heading', this.value)" placeholder="Section Heading" class="text-xs px-2 py-1.5 bg-slate-900 border border-slate-800 text-white rounded-md font-bold">
                            <input type="text" value="${sec.subheading}" onchange="updateSectionField(${sIdx}, 'subheading', this.value)" placeholder="Subheading Accent Description" class="text-xs px-2 py-1.5 bg-slate-900 border border-slate-800 text-white rounded-md col-span-2">
                        </div>
                        <div class="space-y-2 pl-4 border-l border-slate-800">${itemsHtml}</div>
                        <button onclick="addNewItemToSection(${sIdx})" class="text-[10px] bg-slate-900 hover:bg-slate-800 px-3 py-1 rounded-md text-blue-400 border border-slate-800 font-bold ml-4">+ Add Sub-Component Card</button>
                    </div>
                `);
            });
        }

        function updateSectionField(sIdx, field, val) { siteConfig.sections[sIdx][field] = val; }
        function updateItemField(sIdx, iIdx, field, val) { siteConfig.sections[sIdx].items[iIdx][field] = val; }
        
        function addNewSection() {
            siteConfig.sections.push({ id: "custom_" + Date.now(), heading: "New Section", subheading: "Subtitle summary details", items: [] });
            renderEditorDashboard();
        }
        function deleteSection(sIdx) { siteConfig.sections.splice(sIdx, 1); renderEditorDashboard(); }
        
        function addNewItemToSection(sIdx) {
            siteConfig.sections[sIdx].items.push({ title: "New Item Component", description: "Write short descriptive logs here." });
            renderEditorDashboard();
        }
        function deleteItem(sIdx, iIdx) { siteConfig.sections[sIdx].items.splice(iIdx, 1); renderEditorDashboard(); }

        async function saveEverythingLive() {
            const token = localStorage.getItem('admin_session_token');
            const box = document.getElementById('status-box');
            
            siteConfig.profile.hero_title = document.getElementById('hero-title').value;
            siteConfig.profile.hero_bio = document.getElementById('hero-bio').value;
            siteConfig.profile.email = document.getElementById('hero-email').value;

            box.className = "text-xs p-3 rounded-xl border font-mono bg-blue-950 text-blue-400 border-blue-900 block";
            box.innerText = "Synchronizing configuration parameters to origin master...";

            const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(siteConfig, null, 2))));
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO}/contents/data.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "terminal update: master engine schema realignment", content: base64Content, sha: currentSha })
                });

                if(response.ok) {
                    const resJson = await response.json();
                    currentSha = resJson.content.sha; // Keep SHA in sync!
                    box.className = "text-xs p-3 rounded-xl border font-mono bg-emerald-950 text-emerald-400 border-emerald-900 block";
                    box.innerText = "Deployment Success! Changes structural parameters are now live across all environments.";
                } else {
                    throw new Error("GitHub rejected target repository sync adjustments.");
                }
            } catch(e) {
                box.className = "text-xs p-3 rounded-xl border font-mono bg-red-950 text-red-400 border-red-900 block";
                box.innerText = "Write Failure: " + e.message;
            }
        }
    </script>
</body>
</html>

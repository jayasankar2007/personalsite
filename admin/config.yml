backend:
  name: github
  repo: jayasankar2007/personalsite
  branch: main
  base_url: https://decap-cms-oauth.vercel.app

media_folder: "images"
public_folder: "/images"

# Personal Branding Customizer 
logo_url: "https://github.com/jayasankar2007/personalsite/blob/main/05%5B16%5D%20(1).jpg?raw=true"

collections:
  - name: "portfolio"
    label: "Portfolio Content Data"
    icon: "account_circle" # Adds a professional profile avatar icon next to the section tab
    files:
      - file: "data.json"
        name: "content"
        label: "Homepage Content Panel"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Bio", name: "hero_bio", widget: "text" }
          - { label: "LinkedIn URL", name: "linkedin_url", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
